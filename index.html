<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="save-money.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xchange</title>
    <meta name="theme-color" content="rgb(0, 8, 158)">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site">

        <header>

            <h1>Xchange</h1>
            <ul>
                <li>Personal</li>
                <li>Buisness</li>
                <li>Travel</li>
                <li>Rates</li>
            </ul>

        </header>

        <main>
        
            <div class="boxText">
                <h1>Xchanges Currency Converter</h1>
                <h3>Check live foreign currency exchange rates</h3>
            </div>
            
            <div class="convertBox">

                <div class="mainInputHolder">
                    <div class="box">
                        <label for="currenciesDropdownFrom">From</label>
                        <input type="text" name="moneyFrom" id="moneyFrom">
                        <select name="currenciesDropdownFrom" id="currenciesDropdownFrom">
                        </select>
                    </div>
            
                    <div class="box">
                        <label for="currenciesDropdownTo">To</label>
                        <select name="currenciesDropdownTo" id="currenciesDropdownTo">
                        </select>
                    </div>
                </div>

                <div class="output">
                    <h2 class="convertedValues"></h2>
                    <button type="button" onclick="convert()">Convert</button>
                </div>

            </div>

            <div class="currencyTables"></div>

        </main>

        <footer>
            © 2025 Mark Chaitra. All rights reserved.
            <a href="https://ca.linkedin.com/in/mark-chaitra-694703293" target="_blank"><i class="bi bi-linkedin"></i></a>
            <a href="https://github.com/MarkChaitra" target="_blank" rel="noopener noreferrer"><i class="bi bi-github"></i></a>
        </footer>

    </div>

    <script src="back.js"></script>
</body>
</html>
